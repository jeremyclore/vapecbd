<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Корзина — VapeCBD</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <a href="index.html" class="logo">Vape<span>CBD</span></a>
  <nav>
    <a href="catalog.html">Каталог</a>
    <a href="cart.html">Корзина <span id="cartCount">0</span></a>
    <a href="docs.html">Документация</a>
  </nav>
</header>

<main class="page">
  <div class="page-head">
    <p>Checkout</p>
    <h1>Корзина</h1>
  </div>

  <section class="checkout-grid">
    <div class="order-box">
      <h2>Ваш заказ</h2>

      <div id="cartItems"></div>

      <div class="cart-total">
        Итого: <span id="cartTotal">0 ₽</span>
      </div>

      <button type="button" class="btn ghost" onclick="clearCart()">
        Очистить корзину
      </button>
    </div>

    <form class="form-box">
      <h2>Оформление</h2>

      <input placeholder="Имя">
      <input placeholder="Telegram">
      <input placeholder="Email">

      <select>
        <option>Почта России</option>
        <option>СДЭК</option>
        <option>Самовывоз</option>
      </select>

      <textarea placeholder="Адрес доставки или комментарий"></textarea>

      <select>
        <option>Оплата картой</option>
        <option>QR</option>
        <option>Трансгран</option>
        <option>USDT</option>
      </select>

      <button type="button" class="btn" onclick="showThanks()">
        Перейти к оплате
      </button>

      <div id="thanks" class="thanks">
        Спасибо за покупку.<br>
        Наш менеджер свяжется с вами.
      </div>
    </form>
  </section>
</main>

<script src="script.js"></script>
</body>
</html>
